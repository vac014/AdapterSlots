name: adapter_env
# Unified conda environment for all 12 AdapterSlots implementation phases.
# Python 3.10, CUDA 12.4, PyTorch 2.4. Install with:
#   conda env create -f envs/adapter_env.yml
#   conda activate adapter_env
# After activation, install editable package + flash-attn:
#   pip install uv
#   pip install -e .
#   uv pip install "https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3+cu124torch2.4cxx11abiFALSE-cp310-cp310-linux_x86_64.whl"
# For punica (deps/punica), set CUDA_HOME before pip install -e .:
#   export CUDA_HOME=/usr/local/cuda-12.4
#   export PATH=$CUDA_HOME/bin:$PATH
#   export LD_LIBRARY_PATH=$CUDA_HOME/lib64:$LD_LIBRARY_PATH

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10.14

  # ── Core numeric / scientific ────────────────────────────────────────────────
  - numpy>=1.26,<2
  - scipy>=1.12
  - pandas>=2.2

  # ── ML tooling ──────────────────────────────────────────────────────────────
  - pip

  - pip:
    # ── PyTorch (CUDA 12.4 wheels from PyTorch's own index) ──────────────────
    # torch 2.4 matches system CUDA 12.4 (highest available on this machine)
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch==2.4.*
    - torchvision
    - torchaudio

    # ── HuggingFace ecosystem ─────────────────────────────────────────────────
    - transformers>=4.40.0,<5.0.0
    - accelerate>=0.30.0
    - peft>=0.9.0
    - datasets>=2.19.0
    - huggingface-hub>=0.22.0
    - tokenizers>=0.19.0

    # ── vLLM (primary serving engine) ────────────────────────────────────────
    # vllm 0.19.1 requires torch 2.10 (incompatible); use 0.6.x which supports torch 2.4
    - vllm>=0.4.0,<0.7.0

    # ── FlashInfer (flashinfer_composition composability) ────────────────────────────────────
    - flashinfer-python>=0.1.6

    # ── Flash Attention 2 (attention kernel) ──────────────────────────────────
    # NOT listed here: install separately after env creation via uv (see header)
    # Prebuilt wheel: flash_attn-2.8.3+cu124torch2.4cxx11abiFALSE-cp310-cp310-linux_x86_64.whl

    # ── Triton (custom kernel experiments) ───────────────────────────────────
    - triton>=2.2.0

    # ── Serving / async ──────────────────────────────────────────────────────
    - aiohttp>=3.9
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.29.0
    - requests>=2.31.0

    # ── Control theory / stats ────────────────────────────────────────────────
    - scipy>=1.12.0           # Erlang CDF (erlang_scheduler), regression (kernel_decomposition)
    - statsmodels>=0.14.1     # Autocorrelation (workload_characterization)
    - pingouin>=0.5.4         # Cohen's d, effect sizes (isolation_experiment/end_to_end_serving)

    # ── Plotting ──────────────────────────────────────────────────────────────
    - matplotlib>=3.8.0
    - seaborn>=0.13.0

    # ── Monitoring / metrics ─────────────────────────────────────────────────
    - prometheus-client>=0.20.0
    - psutil>=5.9.8

    # ── Profiling helpers ─────────────────────────────────────────────────────
    - nvtx>=0.2.10            # NVTX markers for nsys

    # ── Notebooks / analysis ─────────────────────────────────────────────────
    - jupyter>=1.0.0
    - ipykernel>=6.29.0
    - jupyterlab>=4.1.0

    # ── Testing ───────────────────────────────────────────────────────────────
    - pytest>=8.1.0
    - pytest-cov>=5.0.0

    # ── Utilities ─────────────────────────────────────────────────────────────
    - tqdm>=4.66.0
    - rich>=13.7.0            # Pretty CLI output
    - click>=8.1.7            # CLI argument parsing
    - jsonlines>=4.0.0        # JSONL I/O for traces
    - filelock>=3.13.0        # Safe concurrent file writes
    - pyyaml>=6.0.1
    - tabulate>=0.9.0